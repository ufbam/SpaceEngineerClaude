<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Engineer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: monospace;
  }
  canvas { display: block; image-rendering: pixelated; }
  #hud {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(180,220,180,0.6);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    pointer-events: none;
  }
  #loading {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #4f8;
    font-family: monospace;
    font-size: 18px;
    letter-spacing: 3px;
    z-index: 10;
    transition: opacity 0.5s;
  }
  #loading .bar-wrap {
    width: 300px;
    height: 4px;
    background: #111;
    margin-top: 20px;
    border: 1px solid #4f8;
  }
  #loading .bar {
    height: 100%;
    background: #4f8;
    width: 0%;
    transition: width 0.3s;
  }
</style>
</head>
<body>
<div id="loading">
  <div>INITIALISING SYSTEMS</div>
  <div class="bar-wrap"><div class="bar" id="loadbar"></div></div>
</div>
<canvas id="game"></canvas>
<div id="hud">ARROW KEYS — MOVE</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const MAP_W = 2000, MAP_H = 1146;

// Sprite sheet: 8 cols x 3 rows, each frame 200x220px, sheet = 1600x660px
// Row 0 = UP   (back to camera)
// Row 1 = DOWN (facing camera)
// Row 2 = RIGHT walk (mirrored for LEFT)
const SPRITE_COLS = 8;
const FRAME_W = 200;
const FRAME_H = 220;

// Character render size on screen
const CHAR_SCALE = 0.22;
const CHAR_W = FRAME_W * CHAR_SCALE;  // ~44px
const CHAR_H = FRAME_H * CHAR_SCALE;  // ~48px

// Map scale in world space
const MAP_SCALE = 0.75;

// Movement speed (world pixels per frame)
const SPEED = 3;

// Walk animation speed
const ANIM_FPS = 10;

// Starting position (top-left room)
let playerX = 300 * MAP_SCALE;
let playerY = 150 * MAP_SCALE;

let CANVAS_W = window.innerWidth;
let CANVAS_H = window.innerHeight;

// ─── DIRECTIONS ────────────────────────────────────────────────────────────
const DIR = { UP: 0, DOWN: 1, RIGHT: 2, LEFT: 3 };
const SPRITE_ROW = {
  [DIR.UP]:    0,
  [DIR.DOWN]:  1,
  [DIR.RIGHT]: 2,
  [DIR.LEFT]:  2,  // same row, mirrored
};

// ─── STATE ─────────────────────────────────────────────────────────────────
let direction = DIR.DOWN;
let frameIndex = 0;
let frameTimer = 0;
let moving = false;
let keys = {};

// ─── CANVAS ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = CANVAS_W;
canvas.height = CANVAS_H;

window.addEventListener('resize', () => {
  CANVAS_W = window.innerWidth;
  CANVAS_H = window.innerHeight;
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
});

// ─── ASSETS ────────────────────────────────────────────────────────────────
const mapImg    = new Image();
const spriteImg = new Image();
const maskImg   = new Image();

const maskCanvas = document.createElement('canvas');
const maskCtx = maskCanvas.getContext('2d', { willReadFrequently: true });

let assetsLoaded = 0;
const loadBar = document.getElementById('loadbar');

function assetLoaded() {
  assetsLoaded++;
  loadBar.style.width = (assetsLoaded / 3 * 100) + '%';
  if (assetsLoaded === 3) {
    maskCanvas.width  = MAP_W;
    maskCanvas.height = MAP_H;
    maskCtx.drawImage(maskImg, 0, 0);
    setTimeout(() => {
      const el = document.getElementById('loading');
      el.style.opacity = '0';
      setTimeout(() => el.style.display = 'none', 500);
      requestAnimationFrame(gameLoop);
    }, 300);
  }
}

mapImg.onload    = assetLoaded;
spriteImg.onload = assetLoaded;
maskImg.onload   = assetLoaded;

mapImg.src    = 'GAME_MAP.png';
spriteImg.src = 'Space_Engineer_Walk_Cycle1.png';
maskImg.src   = 'walkable_space.png';

// ─── COLLISION ─────────────────────────────────────────────────────────────
function isWalkable(worldX, worldY) {
  const mx = Math.round(worldX / MAP_SCALE);
  const my = Math.round(worldY / MAP_SCALE);
  if (mx < 0 || my < 0 || mx >= MAP_W || my >= MAP_H) return false;
  try {
    const px = maskCtx.getImageData(mx, my, 1, 1).data;
    return px[0] < 60; // black = walkable
  } catch(e) { return false; }
}

function canMoveTo(wx, wy) {
  const hw = CHAR_W * 0.3;
  const feetY = wy + CHAR_H * 0.45;
  return (
    isWalkable(wx - hw, feetY) &&
    isWalkable(wx + hw, feetY) &&
    isWalkable(wx,      feetY) &&
    isWalkable(wx - hw, wy) &&
    isWalkable(wx + hw, wy)
  );
}

// ─── INPUT ─────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => { keys[e.key] = true;  e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.key] = false; });

// ─── GAME LOOP ─────────────────────────────────────────────────────────────
let lastTime = 0;

function gameLoop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

function update(dt) {
  const up    = keys['ArrowUp']    || keys['w'];
  const down  = keys['ArrowDown']  || keys['s'];
  const left  = keys['ArrowLeft']  || keys['a'];
  const right = keys['ArrowRight'] || keys['d'];

  moving = up || down || left || right;

  let dx = 0, dy = 0;
  if (up)    { dy = -SPEED; direction = DIR.UP;    }
  if (down)  { dy =  SPEED; direction = DIR.DOWN;  }
  if (left)  { dx = -SPEED; direction = DIR.LEFT;  }
  if (right) { dx =  SPEED; direction = DIR.RIGHT; }

  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

  const nx = playerX + dx;
  const ny = playerY + dy;
  if      (canMoveTo(nx, ny))      { playerX = nx; playerY = ny; }
  else if (canMoveTo(nx, playerY)) { playerX = nx; }
  else if (canMoveTo(playerX, ny)) { playerY = ny; }

  if (moving) {
    frameTimer += dt;
    if (frameTimer >= 1 / ANIM_FPS) {
      frameTimer -= 1 / ANIM_FPS;
      frameIndex = (frameIndex + 1) % SPRITE_COLS;
    }
  } else {
    frameIndex = 0;
    frameTimer = 0;
  }
}

function render() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  const scaledMapW = MAP_W * MAP_SCALE;
  const scaledMapH = MAP_H * MAP_SCALE;
  const camX = CANVAS_W / 2 - playerX;
  const camY = CANVAS_H / 2 - playerY;
  const clampedCamX = Math.min(0, Math.max(CANVAS_W  - scaledMapW, camX));
  const clampedCamY = Math.min(0, Math.max(CANVAS_H - scaledMapH, camY));

  ctx.save();
  ctx.translate(clampedCamX, clampedCamY);

  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(mapImg, 0, 0, scaledMapW, scaledMapH);

  const row = SPRITE_ROW[direction];
  const sx  = frameIndex * FRAME_W;
  const sy  = row * FRAME_H;

  if (direction === DIR.LEFT) {
    ctx.save();
    ctx.translate(playerX, playerY);
    ctx.scale(-1, 1);
    ctx.drawImage(spriteImg, sx, sy, FRAME_W, FRAME_H, -CHAR_W / 2, -CHAR_H / 2, CHAR_W, CHAR_H);
    ctx.restore();
  } else {
    ctx.drawImage(spriteImg, sx, sy, FRAME_W, FRAME_H, playerX - CHAR_W / 2, playerY - CHAR_H / 2, CHAR_W, CHAR_H);
  }

  ctx.restore();
}
</script>
</body>
</html>
